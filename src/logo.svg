<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      :root {
        --ark-bg: #0f0f0f;
        --ark-fg: #ffffff;
        --ark-cut: #0f0f0f;
        --ark-accent: #378ADD;
        --ark-gap: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --ark-bg: #ffffff;
          --ark-fg: #0f0f0f;
          --ark-cut: #ffffff;
          --ark-accent: #378ADD;
          --ark-gap: #0f0f0f;
        }
      }
    </style>
  </defs>

  <!-- Circle background -->
  <circle cx="100" cy="100" r="96" fill="var(--ark-bg)"/>

  <!-- A letter -->
  <path d="M100 38 L46 148 L68 148 L100 82 L132 148 L154 148 Z" fill="var(--ark-fg)"/>

  <!-- Inner triangle cutout -->
  <path d="M100 72 L82 120 L118 120 Z" fill="var(--ark-cut)"/>

  <!-- White gap line above blue swoosh -->
  <path d="M56 118 Q100 80 144 118" fill="none" stroke="var(--ark-gap)" stroke-width="5" stroke-linecap="round"/>

  <!-- Blue swoosh crossbar -->
  <path d="M58 126 Q100 88 142 126" fill="none" stroke="var(--ark-accent)" stroke-width="14" stroke-linecap="round"/>
</svg>
